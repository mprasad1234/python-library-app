---
services:
  db:
    image: mdprasad/pyapp:db_image
    deploy:
      replicas: 1
    ports:
      - "3306:3306"
    networks:
      - mynetwork
  auth_service:
    image: mdprasad/pyapp:auth_image
    deploy:
      replicas: 1
    ports:
      - "5001:5001"
    depends_on:
      - db
    networks:
      - mynetwork
  book_service:
    image: mdprasad/pyapp:book_image
    deploy:
      replicas: 1
    ports:
      - "5002:5002"
    depends_on:
      - db
    networks:
      - mynetwork
  borrow_service:
    image: mdprasad/pyapp:borrow_image
    deploy:
      replicas: 1
    ports:
      - "5003:5003"
    depends_on:
      - db
    networks:
      - mynetwork
  app:
    image: mdprasad/pyapp:borrow_image
    deploy:
      replicas: 1
    ports:
      - "5000:5000"
    networks:
      - mynetwork
    depends_on:
      - auth
      - book
      - borrow

networks:
  mynetwork:
    driver: overlay
